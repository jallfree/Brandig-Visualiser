<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staycold Branding Visualiser</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-weight: 300;
            font-size: 1.8rem;
            color: #fff;
            margin-bottom: 4px;
        }

        .subtitle {
            color: #888;
            font-size: 0.9rem;
        }

        .category-section {
            margin-bottom: 50px;
        }

        .category-title {
            font-size: 1.5rem;
            font-weight: 500;
            color: #4ecdc4;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 2px solid #2a3a5a;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .product-card {
            background: #16213e;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
            color: inherit;
        }

        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
        }

        .product-thumbnail {
            width: 100%;
            aspect-ratio: 1;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .product-thumbnail img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        .product-thumbnail .no-image {
            color: #ccc;
            font-size: 0.9rem;
        }

        .product-info {
            padding: 16px;
        }

        .product-name {
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 6px;
        }

        .product-areas {
            font-size: 0.8rem;
            color: #888;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: #16213e;
            border-radius: 12px;
            color: #888;
        }

        .empty-state h3 {
            margin-bottom: 12px;
            color: #aaa;
        }

        .empty-state a {
            color: #4ecdc4;
        }

        .nav-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 10px;
        }

        .nav-btn {
            padding: 10px 20px;
            background: #3a4a6a;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .nav-btn:hover {
            background: #4a5a7a;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="nav-bar">
            <a href="/settings" class="nav-btn">Settings</a>
        </nav>

        <header>
            <h1>Staycold Branding Visualiser</h1>
            <p class="subtitle">Select a product to customise</p>
        </header>

        <div id="content">
            <div class="loading">Loading products...</div>
        </div>
    </div>

    <script>
        async function loadProducts() {
            try {
                const response = await fetch('/api/products');
                const products = await response.json();
                renderProducts(products);
            } catch (error) {
                console.error('Error loading products:', error);
                document.getElementById('content').innerHTML = `
                    <div class="empty-state">
                        <h3>Error loading products</h3>
                        <p>Please make sure the server is running.</p>
                    </div>
                `;
            }
        }

        function renderProducts(products) {
            const content = document.getElementById('content');

            if (products.length === 0) {
                content.innerHTML = `
                    <div class="empty-state">
                        <h3>No products yet</h3>
                        <p>Go to <a href="/settings">Settings</a> to add your first product.</p>
                    </div>
                `;
                return;
            }

            // Separate by category
            const freezers = products.filter(p => p.category === 'freezer');
            const fridges = products.filter(p => p.category === 'fridge');

            let html = '';

            if (freezers.length > 0) {
                html += `
                    <section class="category-section">
                        <h2 class="category-title">Freezers</h2>
                        <div class="product-grid">
                            ${freezers.map(renderProductCard).join('')}
                        </div>
                    </section>
                `;
            }

            if (fridges.length > 0) {
                html += `
                    <section class="category-section">
                        <h2 class="category-title">Fridges</h2>
                        <div class="product-grid">
                            ${fridges.map(renderProductCard).join('')}
                        </div>
                    </section>
                `;
            }

            content.innerHTML = html;
        }

        function renderProductCard(product) {
            const hasMainImage = product.images && product.images.main;
            const mainImageUrl = hasMainImage ? `/products/${product.id}/${product.images.main}` : '';
            const areaLabels = {
                'front': 'Front',
                'side': 'Side',
                'canopy': 'Canopy',
                'glass': 'Glass'
            };
            const areasText = product.areas.map(a => areaLabels[a] || a).join(', ');

            return `
                <a href="/customizer?product=${product.id}" class="product-card">
                    <div class="product-thumbnail">
                        ${hasMainImage
                            ? `<img src="${mainImageUrl}" alt="${product.name}">`
                            : '<span class="no-image">No image</span>'
                        }
                    </div>
                    <div class="product-info">
                        <div class="product-name">${product.name}</div>
                        <div class="product-areas">${areasText || 'No branding areas defined'}</div>
                    </div>
                </a>
            `;
        }

        // Load products on page load
        loadProducts();
    </script>
</body>
</html>
